  <title>Add Quadstar as a contact on your device.</title>


<header>
  <nav>
    <div class="logo">Quadstar</div>
  </nav>
</header>

<section class="hero">
  <h2>Welcome to Quadstar!</h2>
  <p>Tap the card to save our details and get exclusive offers.</p>
</section>
  <script>
    window.onload = function () {
      const vcard =
        `BEGIN:VCARD
VERSION:3.0
ORG:Quadstar
TEL;TYPE=CELL:+XXXXXXXXXX
EMAIL:yourEmail@email.com
PHOTO;TYPE=PNG;
END:VCARD`;

      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'BLM.vcf';
      document.body.appendChild(a); // Needed for some browsers
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
  </script>
